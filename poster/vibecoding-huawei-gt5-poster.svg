<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">Vibecoding Bark Watch poster</title>
  <desc id="desc">A vertical poster for Codex Bark Watch, showing code notifications delivered to a Huawei GT5 style smartwatch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#0d1f2d"/>
      <stop offset="0.76" stop-color="#13291f"/>
      <stop offset="1" stop-color="#161615"/>
    </linearGradient>
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="watchMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f4ef"/>
      <stop offset="0.2" stop-color="#b7b7ad"/>
      <stop offset="0.52" stop-color="#4e514d"/>
      <stop offset="0.78" stop-color="#d9dad4"/>
      <stop offset="1" stop-color="#6b6e68"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061c24"/>
      <stop offset="0.5" stop-color="#0b101b"/>
      <stop offset="1" stop-color="#020509"/>
    </linearGradient>
    <linearGradient id="strap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3235"/>
      <stop offset="0.5" stop-color="#111618"/>
      <stop offset="1" stop-color="#303638"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4fd1ff"/>
      <stop offset="0.5" stop-color="#8df5b5"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="26" stdDeviation="32" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="codeGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <style>
      .sans { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
      .mono { font-family: "Cascadia Mono", "JetBrains Mono", Consolas, monospace; }
      .smallcaps { letter-spacing: 3px; }
    </style>
  </defs>

  <rect width="1080" height="1440" fill="url(#bg)"/>
  <rect width="1080" height="1440" fill="url(#codeGrid)"/>
  <rect width="1080" height="620" fill="url(#gridFade)" opacity="0.34"/>

  <g opacity="0.18" class="mono" fill="#c8f7ff">
    <text x="72" y="140" font-size="22">notify = [ "codex-bark-watch.exe" ]</text>
    <text x="716" y="198" font-size="18">sandbox_permissions</text>
    <text x="72" y="284" font-size="18">watch-approvals()</text>
    <text x="732" y="390" font-size="20">Bark.push()</text>
    <text x="86" y="1035" font-size="18">turn-ended -&gt; phone -&gt; watch</text>
    <text x="628" y="1110" font-size="18">long task done</text>
  </g>

  <g opacity="0.48" fill="none" stroke="url(#signal)" stroke-linecap="round" filter="url(#glow)">
    <path d="M166 736 C318 628 422 576 548 604 C654 628 702 696 820 644" stroke-width="5"/>
    <path d="M220 780 C362 710 468 700 580 736 C704 776 770 804 908 742" stroke-width="3" opacity="0.72"/>
    <path d="M164 832 C312 806 438 832 548 884 C672 942 790 928 900 862" stroke-width="3" opacity="0.54"/>
  </g>

  <g transform="translate(70 82)">
    <rect x="0" y="0" width="270" height="42" rx="21" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
    <circle cx="28" cy="21" r="7" fill="#8df5b5"/>
    <text x="50" y="28" class="mono smallcaps" font-size="16" fill="#d6fff2">OPEN SOURCE TOOL</text>
  </g>

  <g transform="translate(70 178)">
    <text x="0" y="0" class="sans" font-size="92" font-weight="800" fill="#ffffff">Vibecoding</text>
    <text x="0" y="92" class="sans" font-size="92" font-weight="800" fill="#ffffff">&#x522B;&#x518D;&#x5E72;&#x7B49;</text>
    <text x="4" y="162" class="sans" font-size="32" fill="#b9c8d0">Codex &#x5B8C;&#x6210;&#x4EFB;&#x52A1; / &#x7B49;&#x5F85;&#x6743;&#x9650;&#x5BA1;&#x6838;&#x65F6;&#xFF0C;</text>
    <text x="4" y="207" class="sans" font-size="32" fill="#b9c8d0">&#x628A;&#x63D0;&#x9192;&#x63A8;&#x5230;&#x624B;&#x673A;&#x548C; Huawei GT5&#x3002;</text>
  </g>

  <g transform="translate(70 470)">
    <rect x="0" y="0" width="472" height="262" rx="28" fill="#07131b" fill-opacity="0.86" stroke="#8df5b5" stroke-opacity="0.2"/>
    <rect x="22" y="24" width="428" height="44" rx="13" fill="#ffffff" fill-opacity="0.07"/>
    <circle cx="48" cy="46" r="7" fill="#ff6b6b"/>
    <circle cx="74" cy="46" r="7" fill="#ffd166"/>
    <circle cx="100" cy="46" r="7" fill="#8df5b5"/>
    <text x="126" y="52" class="mono" font-size="17" fill="#8aa0aa">codex session</text>
    <g class="mono" font-size="21">
      <text x="34" y="112" fill="#4fd1ff">if</text>
      <text x="70" y="112" fill="#d9e6eb">(task.done)</text>
      <text x="34" y="152" fill="#8df5b5">push</text>
      <text x="94" y="152" fill="#d9e6eb">("&#x5B8C;&#x6210;&#x4E86;&#xFF0C;&#x770B;&#x4E00;&#x773C;")</text>
      <text x="34" y="192" fill="#ffd166">watch</text>
      <text x="104" y="192" fill="#d9e6eb">("approval needed")</text>
      <text x="34" y="232" fill="#8aa0aa">// no more silent waiting</text>
    </g>
  </g>

  <g transform="translate(600 374)" filter="url(#softShadow)">
    <path d="M210 4 C248 38 270 88 270 150 L270 744 C270 806 248 856 210 890 L108 890 C70 856 48 806 48 744 L48 150 C48 88 70 38 108 4 Z" fill="url(#strap)"/>
    <path d="M112 18 C86 54 72 98 72 151 L72 742 C72 794 86 839 112 874" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="18"/>
    <path d="M206 18 C232 54 246 98 246 151 L246 742 C246 794 232 839 206 874" fill="none" stroke="#000000" stroke-opacity="0.28" stroke-width="18"/>
    <circle cx="159" cy="447" r="236" fill="url(#watchMetal)"/>
    <circle cx="159" cy="447" r="213" fill="#111514"/>
    <circle cx="159" cy="447" r="198" fill="url(#screen)"/>
    <circle cx="159" cy="447" r="188" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <rect x="387" y="410" width="23" height="70" rx="10" fill="#9b9d96"/>
    <rect x="26" y="408" width="25" height="78" rx="11" fill="#7c7f79"/>
    <text x="159" y="318" text-anchor="middle" class="mono" font-size="18" fill="#8aa0aa">09:31</text>
    <text x="159" y="358" text-anchor="middle" class="sans" font-size="24" fill="#d9e6eb">Codex Bark Watch</text>
    <rect x="62" y="386" width="194" height="126" rx="30" fill="#ffffff" fill-opacity="0.1" stroke="#8df5b5" stroke-opacity="0.34"/>
    <circle cx="98" cy="426" r="15" fill="#8df5b5"/>
    <path d="M91 426 L96 432 L107 418" fill="none" stroke="#07131b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="126" y="423" class="sans" font-size="22" font-weight="700" fill="#ffffff">&#x9700;&#x8981;&#x786E;&#x8BA4;</text>
    <text x="126" y="457" class="sans" font-size="17" fill="#b9c8d0">&#x6743;&#x9650;&#x5BA1;&#x6838;&#x6B63;&#x5728;&#x7B49;&#x5F85;</text>
    <text x="126" y="486" class="sans" font-size="17" fill="#b9c8d0">&#x62AC;&#x8155;&#x5904;&#x7406;&#xFF0C;&#x4E0D;&#x9519;&#x8FC7;</text>
    <g opacity="0.58" fill="none" stroke="#4fd1ff" stroke-width="4" stroke-linecap="round">
      <path d="M102 570 C126 546 192 546 216 570"/>
      <path d="M120 594 C138 580 180 580 198 594"/>
      <path d="M150 616 L168 616"/>
    </g>
    <text x="159" y="665" text-anchor="middle" class="sans" font-size="19" fill="#8aa0aa">Huawei GT5 style watch</text>
  </g>

  <g transform="translate(70 805)">
    <g>
      <rect x="0" y="0" width="286" height="112" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="28" y="43" class="sans" font-size="26" font-weight="700" fill="#ffffff">&#x4EFB;&#x52A1;&#x5B8C;&#x6210;&#x63D0;&#x9192;</text>
      <text x="28" y="80" class="sans" font-size="20" fill="#b9c8d0">&#x957F;&#x4EFB;&#x52A1;&#x7ED3;&#x675F;&#xFF0C;&#x9A6C;&#x4E0A;&#x77E5;&#x9053;</text>
    </g>
    <g transform="translate(314 0)">
      <rect x="0" y="0" width="286" height="112" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="28" y="43" class="sans" font-size="26" font-weight="700" fill="#ffffff">&#x6743;&#x9650;&#x5BA1;&#x6838;&#x63D0;&#x9192;</text>
      <text x="28" y="80" class="sans" font-size="20" fill="#b9c8d0">&#x7B49;&#x5F85;&#x786E;&#x8BA4;&#x65F6;&#x63A8;&#x5230;&#x624B;&#x8868;</text>
    </g>
    <g transform="translate(0 136)">
      <rect x="0" y="0" width="600" height="112" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="28" y="43" class="sans" font-size="26" font-weight="700" fill="#ffffff">Bark + Watchdog</text>
      <text x="28" y="80" class="sans" font-size="20" fill="#b9c8d0">&#x5F00;&#x673A;&#x9690;&#x85CF;&#x81EA;&#x542F;&#xFF0C;&#x5F02;&#x5E38;&#x9000;&#x51FA;&#x540E;&#x81EA;&#x52A8;&#x62C9;&#x8D77;</text>
    </g>
  </g>

  <g transform="translate(70 1170)">
    <rect x="0" y="0" width="940" height="158" rx="28" fill="#d7fff0" fill-opacity="0.92"/>
    <text x="36" y="54" class="sans" font-size="34" font-weight="800" fill="#07131b">Codex Bark Watch</text>
    <text x="36" y="98" class="sans" font-size="23" fill="#1c3b37">&#x7ED9; vibe coding &#x52A0;&#x4E00;&#x4E2A;&#x4E0D;&#x4F1A;&#x9519;&#x8FC7;&#x7684;&#x63D0;&#x9192;&#x5C42;&#x3002;</text>
    <text x="36" y="132" class="mono" font-size="18" fill="#37514d">notify wrapper - approval watcher - hidden startup</text>
    <g transform="translate(752 28)">
      <rect x="0" y="0" width="118" height="118" rx="18" fill="#07131b"/>
      <path d="M30 33 H88 M30 57 H88 M30 81 H62" stroke="#8df5b5" stroke-width="7" stroke-linecap="round"/>
      <path d="M78 77 L91 90 L106 66" fill="none" stroke="#4fd1ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <text x="70" y="1372" class="sans" font-size="22" fill="#8aa0aa">&#x5F00;&#x6E90;&#x9879;&#x76EE;&#x6D77;&#x62A5; - &#x4E0D;&#x4F7F;&#x7528;&#x5B98;&#x65B9;&#x4EA7;&#x54C1;&#x56FE;&#x6216;&#x5546;&#x6807; Logo - GT5 &#x4E3A;&#x7528;&#x6237;&#x8BBE;&#x5907;&#x573A;&#x666F;&#x8BF4;&#x660E;</text>
</svg>
